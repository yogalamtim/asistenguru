<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator RPM - Rencana Pembelajaran Mendalam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .print-area { line-height: 1.6; }
        .table-custom th, .table-custom td { border: 1px solid #000; padding: 12px; vertical-align: top; text-align: justify; }
        .table-custom th { background-color: #f3f4f6; }
        @media print {
            .no-print { display: none; }
            .print-area { width: 100%; border: none; box-shadow: none; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <div class="max-w-5xl mx-auto px-4 pt-10">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2">Generator RPM</h1>
            <p class="text-slate-600 italic">Rencana Pembelajaran Mendalam - Semua Jenjang & Mata Pelajaran</p>
        </div>

        <!-- Input Form Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8 mb-8 no-print border border-slate-200">
            <h2 class="text-xl font-bold mb-6 text-indigo-700 flex items-center gap-2">
                <i class="fas fa-edit"></i> Input Data Pembelajaran
            </h2>
            
            <form id="rpmForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Satuan Pendidikan & Guru -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Satuan Pendidikan *</label>
                        <input type="text" id="sekolah" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Contoh: SD Negeri 1 Jakarta">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Guru *</label>
                        <input type="text" id="namaGuru" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Nama Lengkap">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">NIP Guru</label>
                        <input type="text" id="nipGuru" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="NIP/NIK">
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Kepala Sekolah *</label>
                        <input type="text" id="namaKepsek" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Nama Lengkap">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">NIP Kepala Sekolah</label>
                        <input type="text" id="nipKepsek" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="NIP/NIK">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Jenjang *</label>
                            <select id="jenjang" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="SD">SD</option>
                                <option value="SMP">SMP</option>
                                <option value="SMA">SMA</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Kelas *</label>
                            <input type="text" id="kelas" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Contoh: 4 / IV">
                        </div>
                    </div>
                </div>

                <hr class="md:col-span-2 border-slate-100 my-2">

                <!-- Mapel & CP -->
                <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Mata Pelajaran *</label>
                        <input type="text" id="mapel" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Matematika, IPA, dsb.">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Jumlah Pertemuan *</label>
                        <input type="number" id="jmlPertemuan" required min="1" value="1" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Durasi per Pertemuan *</label>
                        <input type="text" id="durasi" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="e.g. 2 x 35 menit">
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Capaian Pembelajaran (CP) *</label>
                    <textarea id="cp" required class="w-full p-2.5 border rounded-lg h-24 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Masukkan deskripsi CP..."></textarea>
                </div>

                <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Tujuan Pembelajaran *</label>
                        <textarea id="tp" required class="w-full p-2.5 border rounded-lg h-24 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Tujuan yang ingin dicapai..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Materi Pelajaran *</label>
                        <textarea id="materi" required class="w-full p-2.5 border rounded-lg h-24 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Topik atau materi pokok..."></textarea>
                    </div>
                </div>

                <!-- Pedagogi & Dimensi -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Praktik Pedagogis per Pertemuan *</label>
                    <div id="pedagogiContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                        <!-- Will be populated based on number of meetings -->
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Dimensi Lulusan (Multi-pilih) *</label>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        <label class="flex items-center gap-2 text-sm text-slate-600 bg-slate-50 p-2 rounded cursor-pointer hover:bg-indigo-50 transition">
                            <input type="checkbox" name="dimensi" value="Keimanan & Ketakwaan"> Keimanan & Ketakwaan
                        </label>
                        <label class="flex items-center gap-2 text-sm text-slate-600 bg-slate-50 p-2 rounded cursor-pointer hover:bg-indigo-50 transition">
                            <input type="checkbox" name="dimensi" value="Kewargaan"> Kewargaan
                        </label>
                        <label class="flex items-center gap-2 text-sm text-slate-600 bg-slate-50 p-2 rounded cursor-pointer hover:bg-indigo-50 transition">
                            <input type="checkbox" name="dimensi" value="Penalaran Kritis"> Penalaran Kritis
                        </label>
                        <label class="flex items-center gap-2 text-sm text-slate-600 bg-slate-50 p-2 rounded cursor-pointer hover:bg-indigo-50 transition">
                            <input type="checkbox" name="dimensi" value="Kreativitas"> Kreativitas
                        </label>
                        <label class="flex items-center gap-2 text-sm text-slate-600 bg-slate-50 p-2 rounded cursor-pointer hover:bg-indigo-50 transition">
                            <input type="checkbox" name="dimensi" value="Kolaborasi"> Kolaborasi
                        </label>
                        <label class="flex items-center gap-2 text-sm text-slate-600 bg-slate-50 p-2 rounded cursor-pointer hover:bg-indigo-50 transition">
                            <input type="checkbox" name="dimensi" value="Kemandirian"> Kemandirian
                        </label>
                        <label class="flex items-center gap-2 text-sm text-slate-600 bg-slate-50 p-2 rounded cursor-pointer hover:bg-indigo-50 transition">
                            <input type="checkbox" name="dimensi" value="Kesehatan"> Kesehatan
                        </label>
                        <label class="flex items-center gap-2 text-sm text-slate-600 bg-slate-50 p-2 rounded cursor-pointer hover:bg-indigo-50 transition">
                            <input type="checkbox" name="dimensi" value="Komunikasi"> Komunikasi
                        </label>
                    </div>
                </div>

                <div class="md:col-span-2 pt-4">
                    <button type="submit" id="generateBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-3">
                        <i class="fas fa-magic"></i> Generate Rencana Pembelajaran Mendalam
                    </button>
                </div>
            </form>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden text-center py-10">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
            <p class="text-slate-600 animate-pulse font-medium">AI sedang menyusun RPM terbaik untuk Anda...</p>
        </div>

        <!-- Result Display -->
        <div id="resultContainer" class="hidden">
            <div class="flex justify-end gap-3 mb-4 no-print">
                <button onclick="copyToGdocs()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition">
                    <i class="fas fa-copy"></i> Salin & Buka di Google Dokumen
                </button>
                <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition">
                    <i class="fas fa-print"></i> Cetak PDF
                </button>
            </div>

            <div id="rpmContent" class="bg-white p-8 sm:p-12 shadow-2xl border border-slate-200 print-area rounded-lg overflow-x-auto">
                <!-- Generated content will appear here -->
            </div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="alertModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-sm w-full p-6 shadow-2xl">
            <h3 class="text-lg font-bold text-slate-800 mb-2" id="alertTitle">Pemberitahuan</h3>
            <p class="text-slate-600 mb-6" id="alertMsg"></p>
            <button onclick="closeAlert()" class="w-full bg-indigo-600 text-white font-bold py-2 rounded-lg">OK</button>
        </div>
    </div>

    <script type="module">
        const apiKey = "";
        
        const form = document.getElementById('rpmForm');
        const jmlPertemuanInput = document.getElementById('jmlPertemuan');
        const pedagogiContainer = document.getElementById('pedagogiContainer');
        const generateBtn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('resultContainer');
        const rpmContent = document.getElementById('rpmContent');

        // Update pedagogi fields when meeting count changes
        function updatePedagogiFields() {
            const count = parseInt(jmlPertemuanInput.value) || 1;
            pedagogiContainer.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                pedagogiContainer.innerHTML += `
                    <div class="p-3 bg-indigo-50 rounded-lg border border-indigo-100">
                        <span class="text-xs font-bold text-indigo-600 uppercase">Pertemuan ${i}</span>
                        <select name="pedagogi" required class="w-full mt-1 p-2 bg-white border rounded focus:ring-1 focus:ring-indigo-500 outline-none text-sm">
                            <option value="Inkuiri-Discovery">Inkuiri-Discovery</option>
                            <option value="PjBL">PjBL (Project Based Learning)</option>
                            <option value="Problem Based Learning">Problem Based Learning</option>
                            <option value="Game Based Learning">Game Based Learning</option>
                            <option value="Station Learning">Station Learning</option>
                        </select>
                    </div>
                `;
            }
        }

        jmlPertemuanInput.addEventListener('input', updatePedagogiFields);
        updatePedagogiFields();

        // API Call with Exponential Backoff
        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            identifikasi: {
                                type: "OBJECT",
                                properties: {
                                    siswa: { type: "string" },
                                    lintasDisiplin: { type: "string" },
                                    topik: { type: "string" },
                                    kemitraan: { type: "string" },
                                    lingkungan: { type: "string" },
                                    digital: { type: "string" }
                                }
                            },
                            pengalaman: {
                                type: "ARRAY",
                                items: {
                                    type: "OBJECT",
                                    properties: {
                                        pertemuan: { type: "number" },
                                        praktik: { type: "string" },
                                        memahami: { type: "string" },
                                        mengaplikasi: { type: "string" },
                                        refleksi: { type: "string" }
                                    }
                                }
                            },
                            asesmen: {
                                type: "OBJECT",
                                properties: {
                                    awal: { type: "string" },
                                    proses: { type: "string" },
                                    akhir: { type: "string" }
                                }
                            }
                        }
                    }
                }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (err) {
                    if (i === 4) throw err;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                sekolah: document.getElementById('sekolah').value,
                namaGuru: document.getElementById('namaGuru').value,
                nipGuru: document.getElementById('nipGuru').value || "-",
                namaKepsek: document.getElementById('namaKepsek').value,
                nipKepsek: document.getElementById('nipKepsek').value || "-",
                jenjang: document.getElementById('jenjang').value,
                kelas: document.getElementById('kelas').value,
                mapel: document.getElementById('mapel').value,
                cp: document.getElementById('cp').value,
                tp: document.getElementById('tp').value,
                materi: document.getElementById('materi').value,
                jmlPertemuan: document.getElementById('jmlPertemuan').value,
                durasi: document.getElementById('durasi').value,
                dimensi: Array.from(document.querySelectorAll('input[name="dimensi"]:checked')).map(el => el.value),
                pedagogiList: Array.from(document.querySelectorAll('select[name="pedagogi"]')).map(el => el.value)
            };

            if (formData.dimensi.length === 0) {
                showAlert("Peringatan", "Pilih minimal satu Dimensi Lulusan.");
                return;
            }

            loading.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            generateBtn.disabled = true;

            const prompt = `
                Generate RPM (Rencana Pembelajaran Mendalam) data for:
                School: ${formData.sekolah}
                Subject: ${formData.mapel}
                CP: ${formData.cp}
                TP: ${formData.tp}
                Material: ${formData.materi}
                Pedagogical Practices: ${formData.pedagogiList.join(', ')}
                Graduate Dimensions: ${formData.dimensi.join(', ')}
                Meetings: ${formData.jmlPertemuan}
                
                Guidelines:
                1. 'identifikasi.siswa': Automatically describe the typical learners for ${formData.jenjang} grade ${formData.kelas} in relation to the material.
                2. 'identifikasi.lintasDisiplin': Automatically generate relevant cross-disciplinary connections.
                3. 'identifikasi.topik': Specific learning topic based on material.
                4. 'identifikasi.kemitraan': Suggest learning partnerships (parents, experts, community).
                5. 'identifikasi.lingkungan': Suggest optimal physical/social learning environment.
                6. 'identifikasi.digital': Suggest digital tools with specific online references/URLs.
                7. 'pengalaman': For each meeting, describe 'memahami' (opening/mindfulness), 'mengaplikasi' (core activities following the syntax of the selected pedagogy), and 'refleksi' (closing/reflection).
                8. 'asesmen': Generate appropriate diagnostic, process (observation/rubric), and final (product/presentation) assessments.
                
                Language: Indonesian. Tone: Professional, pedagogical, deep learning focused.
            `;

            try {
                const aiData = await callGemini(prompt);
                renderRPM(formData, aiData);
            } catch (err) {
                showAlert("Error", "Gagal menghubungi AI. Silakan coba lagi beberapa saat lagi.");
            } finally {
                loading.classList.add('hidden');
                generateBtn.disabled = false;
            }
        });

        function renderRPM(form, ai) {
            let pedagogiRows = "";
            form.pedagogiList.forEach((p, idx) => {
                pedagogiRows += `Pertemuan ${idx + 1}: ${p}<br>`;
            });

            let pengalamanTable = "";
            ai.pengalaman.forEach(item => {
                pengalamanTable += `
                    <tr>
                        <td colspan="2" style="background-color: #f9fafb; font-weight: bold; text-align: center;">PENGALAMAN BELAJAR - PERTEMUAN ${item.pertemuan} (${item.praktik})</td>
                    </tr>
                    <tr>
                        <td><strong>Memahami</strong><br><small>(Berkesadaran, Bermakna, Menggembirakan)</small></td>
                        <td>${item.memahami}</td>
                    </tr>
                    <tr>
                        <td><strong>Mengaplikasi</strong><br><small>(Langkah Inti & Sintaks)</small></td>
                        <td>${item.mengaplikasi}</td>
                    </tr>
                    <tr>
                        <td><strong>Refleksi</strong><br><small>(Kesimpulan & Umpan Balik)</small></td>
                        <td>${item.refleksi}</td>
                    </tr>
                `;
            });

            const htmlContent = `
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold uppercase underline">RENCANA PEMBELAJARAN MENDALAM (RPM)</h2>
                    <p class="font-semibold">${form.sekolah}</p>
                </div>

                <table class="table-custom w-full mb-8">
                    <tr>
                        <th colspan="2">I. IDENTITAS</th>
                    </tr>
                    <tr>
                        <td width="30%">Nama Satuan Pendidikan</td>
                        <td>${form.sekolah}</td>
                    </tr>
                    <tr>
                        <td>Mata Pelajaran</td>
                        <td>${form.mapel}</td>
                    </tr>
                    <tr>
                        <td>Kelas / Semester</td>
                        <td>${form.kelas} / ${parseInt(form.kelas) % 2 === 0 ? 'Genap' : 'Ganjil'}</td>
                    </tr>
                    <tr>
                        <td>Durasi Pertemuan</td>
                        <td>${form.durasi} (${form.jmlPertemuan} Pertemuan)</td>
                    </tr>

                    <tr>
                        <th colspan="2">II. IDENTIFIKASI</th>
                    </tr>
                    <tr>
                        <td>Siswa</td>
                        <td>${ai.identifikasi.siswa}</td>
                    </tr>
                    <tr>
                        <td>Materi Pelajaran</td>
                        <td>${form.materi}</td>
                    </tr>
                    <tr>
                        <td>Capaian Dimensi Lulusan</td>
                        <td>${form.dimensi.join(', ')}</td>
                    </tr>

                    <tr>
                        <th colspan="2">III. DESAIN PEMBELAJARAN</th>
                    </tr>
                    <tr>
                        <td>Capaian Pembelajaran (CP)</td>
                        <td>${form.cp}</td>
                    </tr>
                    <tr>
                        <td>Lintas Disiplin Ilmu</td>
                        <td>${ai.identifikasi.lintasDisiplin}</td>
                    </tr>
                    <tr>
                        <td>Tujuan Pembelajaran</td>
                        <td>${form.tp}</td>
                    </tr>
                    <tr>
                        <td>Topik Pembelajaran</td>
                        <td>${ai.identifikasi.topik}</td>
                    </tr>
                    <tr>
                        <td>Praktik Pedagogis</td>
                        <td>${pedagogiRows}</td>
                    </tr>
                    <tr>
                        <td>Kemitraan Pembelajaran</td>
                        <td>${ai.identifikasi.kemitraan}</td>
                    </tr>
                    <tr>
                        <td>Lingkungan Pembelajaran</td>
                        <td>${ai.identifikasi.lingkungan}</td>
                    </tr>
                    <tr>
                        <td>Pemanfaatan Digital</td>
                        <td>${ai.identifikasi.digital}</td>
                    </tr>

                    ${pengalamanTable}

                    <tr>
                        <th colspan="2">IV. ASESMEN PEMBELAJARAN</th>
                    </tr>
                    <tr>
                        <td>Asesmen Awal (Diagnostik)</td>
                        <td>${ai.asesmen.awal}</td>
                    </tr>
                    <tr>
                        <td>Asesmen Proses (Formatif)</td>
                        <td>${ai.asesmen.proses}</td>
                    </tr>
                    <tr>
                        <td>Asesmen Akhir (Sumatif)</td>
                        <td>${ai.asesmen.akhir}</td>
                    </tr>
                </table>

                <div class="mt-12 flex justify-between items-start">
                    <div class="text-left">
                        <p>Mengetahui,</p>
                        <p class="mb-20">Kepala Sekolah</p>
                        <p class="font-bold underline">${form.namaKepsek}</p>
                        <p>NIP. ${form.nipKepsek}</p>
                    </div>
                    <div class="text-left">
                        <p>Jakarta, ${new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'})}</p>
                        <p class="mb-20">Guru Mata Pelajaran</p>
                        <p class="font-bold underline">${form.namaGuru}</p>
                        <p>NIP. ${form.nipGuru}</p>
                    </div>
                </div>
            `;

            rpmContent.innerHTML = htmlContent;
            resultContainer.classList.remove('hidden');
            resultContainer.scrollIntoView({ behavior: 'smooth' });
        }

        window.showAlert = function(title, msg) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMsg').innerText = msg;
            document.getElementById('alertModal').classList.remove('hidden');
        };

        window.closeAlert = function() {
            document.getElementById('alertModal').classList.add('hidden');
        };

        window.copyToGdocs = function() {
            const content = document.getElementById('rpmContent');
            
            // Selection and copy
            const range = document.createRange();
            range.selectNode(content);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            
            try {
                document.execCommand('copy');
                window.getSelection().removeAllRanges();
                
                // Open Google Docs in new tab
                window.open('https://docs.google.com/document/create', '_blank');
                
                showAlert("Berhasil!", "RPM telah disalin ke clipboard. Tab Google Dokumen baru telah dibuka. Silakan tempel (Ctrl+V) di sana.");
            } catch (err) {
                showAlert("Gagal", "Tidak dapat menyalin konten. Silakan salin secara manual.");
            }
        };

    </script>
</body>
</html>
